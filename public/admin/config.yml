backend:
  name: github
  repo: analistasistemas-bit/landingpagebufalo
  branch: main
  base_url: https://bufalo-cms-auth.analistasistemas.workers.dev

media_folder: public/images/uploads
public_folder: /images/uploads

locale: pt

# ─────────────────────────────────────────────
# PÁGINAS
# ─────────────────────────────────────────────
collections:
  - name: paginas
    label: Páginas
    files:

      - name: home
        label: Home
        file: src/content/paginas/home.json
        fields:
          - { name: kicker,               label: Kicker (destaque topo),   widget: string }
          - { name: headline,             label: Headline principal,        widget: string }
          - { name: subtitulo,            label: Subtítulo,                 widget: text }
          - { name: ctaPrimarioLabel,     label: Botão primário,            widget: string }
          - { name: ctaSecundarioLabel,   label: Botão secundário,          widget: string }
          - { name: categoriasHeading,    label: Título — Categorias,       widget: string }
          - { name: categoriasIntro,      label: Intro — Categorias,        widget: text }
          - { name: destaquesHeading,     label: Título — Destaques,        widget: string }
          - { name: marcaTitulo,          label: Título — Seção da Marca,   widget: string }
          - { name: marcaTexto,           label: Texto — Seção da Marca,    widget: text }
          - { name: marcaLinkLabel,       label: Link — Seção da Marca,     widget: string }
          - { name: revendedorCTATitulo,  label: CTA Revendedor — Título,   widget: string }
          - { name: revendedorCTATexto,   label: CTA Revendedor — Texto,    widget: text }
          - { name: revendedorCTABotao,   label: CTA Revendedor — Botão,    widget: string }

      - name: a-marca
        label: A Marca
        file: src/content/paginas/a-marca.json
        fields:
          - { name: titulo,               label: Título da página,          widget: string }
          - { name: abertura,             label: Texto de abertura,         widget: text }
          - { name: missaoTexto,          label: Missão,                    widget: text }
          - { name: visaoTexto,           label: Visão,                     widget: text }
          - name: valores
            label: Valores
            widget: list
            summary: '{{fields.nome}}'
            collapsed: true
            fields:
              - { name: nome,  label: Nome,      widget: string }
              - { name: desc,  label: Descrição, widget: string }
          - { name: posicionamentoFrase,  label: Posicionamento — Frase,    widget: string }
          - { name: posicionamentoTexto,  label: Posicionamento — Texto,    widget: text }
          - { name: presencaKicker,       label: Presença — Kicker,         widget: string }
          - { name: presencaTexto,        label: Presença — Texto,          widget: text }
          - { name: ctaPrimario,          label: Botão primário,            widget: string }
          - { name: ctaSecundario,        label: Botão secundário,          widget: string }

      - name: qualidade
        label: Qualidade
        file: src/content/paginas/qualidade.json
        fields:
          - { name: titulo,               label: Título da página,          widget: string }
          - name: blocos
            label: Blocos de qualidade
            widget: list
            summary: '{{fields.titulo}}'
            collapsed: true
            fields:
              - { name: titulo, label: Título, widget: string }
              - { name: texto,  label: Texto,  widget: text }
          - { name: aplicacoesHeading,    label: Título — Aplicações,       widget: string }
          - name: aplicacoes
            label: Aplicações
            widget: list
            summary: '{{fields.tipo}}'
            collapsed: true
            fields:
              - { name: tipo, label: Tipo, widget: string }
              - { name: desc, label: Descrição, widget: text }
          - { name: ctaTitulo,  label: CTA — Título,  widget: string }
          - { name: ctaTexto,   label: CTA — Texto,   widget: text }
          - { name: ctaBotao,   label: CTA — Botão,   widget: string }

      - name: revendedor
        label: Seja um Revendedor
        file: src/content/paginas/revendedor.json
        fields:
          - { name: titulo,              label: Título da página,           widget: string }
          - { name: intro,               label: Texto de introdução,        widget: text }
          - { name: beneficiosHeading,   label: Título — Benefícios,        widget: string }
          - name: beneficios
            label: Benefícios
            widget: list
            summary: '{{fields.titulo}}'
            collapsed: true
            fields:
              - { name: titulo, label: Título,    widget: string }
              - { name: desc,   label: Descrição, widget: text }
          - { name: ctaTitulo,  label: CTA — Título,  widget: string }
          - { name: ctaTexto,   label: CTA — Texto,   widget: text }
          - { name: ctaBotao,   label: CTA — Botão,   widget: string }

      - name: contato
        label: Contato
        file: src/content/paginas/contato.json
        fields:
          - { name: titulo, label: Título da página,    widget: string }
          - { name: intro,  label: Texto de introdução, widget: text }

  # ─────────────────────────────────────────────
  # PRODUTOS
  # ─────────────────────────────────────────────
  - name: produtos
    label: Produtos
    files:
      - name: lista
        label: Lista de Produtos
        file: src/data/produtos.json
        fields:
          - name: items
            label: Produtos
            widget: list
            root: true
            summary: '{{fields.nome}}'
            collapsed: true
            fields:
              - { name: id,           label: Código (ID),     widget: string, hint: 'Código interno do produto, ex: BF-120-10K' }
              - { name: nome,         label: Nome,            widget: string }
              - name: categoriaSlug
                label: Categoria
                widget: select
                hint: 'Categoria onde o produto aparece no site'
                options:
                  - { label: 'Linhas de Costura',    value: linhas-de-costura }
                  - { label: 'Fios para Overloque',  value: fios-overloque }
                  - { label: 'Rabo de Rato',         value: rabo-de-rato }
                  - { label: 'Pompons',              value: pompons }
                  - { label: 'Rendas',               value: rendas }
                  - { label: 'Bico Bordado',         value: bico-bordado }
                  - { label: 'Passamanarias',        value: passamanarias }
                  - { label: 'Fitas Natalinas',      value: fitas-natalinas }
                  - { label: 'Pérolas',              value: perolas }
                  - { label: 'Strass',               value: strass }
                  - { label: 'Zíperes',              value: ziperes }
                  - { label: 'Fechos Adesivos',      value: fechos-adesivos }
                  - { label: 'Botões de Pressão',    value: botoes-de-pressao }
                  - { label: 'Colchetes de Pressão', value: colchetes-de-pressao }
                  - { label: 'Colchetes de Gancho',  value: colchetes-de-gancho }
                  - { label: 'Elásticos',            value: elasticos }
                  - { label: 'Colas',                value: colas }
                  - { label: 'Lápis',                value: lapis }
                  - { label: 'Tesouras',             value: tesouras }
                  - { label: 'Tesoura de Arremate',  value: tesoura-de-arremate }
                  - { label: 'Aplicador de Tag',     value: aplicador-de-tag }
                  - { label: 'Fita Métrica',         value: fita-metrica }
                  - { label: 'Fita Refletiva',       value: fita-refletiva }
                  - { label: 'Fita Adesiva',         value: fita-adesiva }
              - { name: composicao,   label: Composição,      widget: string,  required: false, hint: 'Ex: 100% Poliéster' }
              - { name: medida,       label: Medida,          widget: string,  required: false, hint: 'Ex: Cone 10.000 m' }
              - { name: embalagem,    label: Embalagem,       widget: string,  required: false, hint: 'Ex: Caixa com 60 cones' }
              - { name: cores,        label: Cores,           widget: string,  required: false, hint: 'Quantidade ou descrição das cores disponíveis' }
              - { name: destaque,     label: Destaque na home, widget: boolean, default: false, hint: 'Ligado = produto aparece em destaque na página inicial' }
              - { name: obs,          label: Observações,     widget: text,    required: false }
              - { name: imagem,       label: Foto do produto, widget: image,   required: false, hint: 'Se vazio, o site usa a imagem padrão da categoria' }

  # ─────────────────────────────────────────────
  # CATEGORIAS
  # ─────────────────────────────────────────────
  - name: categorias
    label: Categorias
    files:
      - name: lista
        label: Lista de Categorias
        file: src/data/categorias.json
        fields:
          - name: items
            label: Categorias
            widget: list
            root: true
            summary: '{{fields.nome}}'
            collapsed: true
            fields:
              - { name: id,        label: Código (ID), widget: string, hint: 'Ex: CAT-01' }
              - { name: nome,      label: Nome,        widget: string }
              - { name: slug,      label: Slug (URL),  widget: string, hint: 'Identificador na URL, ex: linhas-de-costura. Não alterar se já houver produtos nesta categoria.' }
              - { name: descricao, label: Descrição,   widget: text }
              - { name: ordem,     label: Ordem,       widget: number }
              - { name: imagem,    label: Imagem,      widget: image, required: false }

  # ─────────────────────────────────────────────
  # CONFIGURAÇÕES GLOBAIS
  # ─────────────────────────────────────────────
  - name: configuracoes
    label: Configurações
    files:
      - name: config
        label: Configurações Globais
        file: src/data/config.json
        fields:
          - { name: whatsapp,  label: "Número WhatsApp (ex: 5581983426557)", widget: string }
          - { name: email,     label: E-mail de contato,                      widget: string }
          - { name: dominio,   label: Domínio do site,                        widget: string }
          - { name: tagline,   label: Tagline da marca,                       widget: string }
          - name: redes
            label: Redes sociais
            widget: object
            fields:
              - { name: instagram, label: Instagram (URL), widget: string, required: false }
              - { name: facebook,  label: Facebook (URL),  widget: string, required: false }
          - name: ctas
            label: Mensagens de WhatsApp
            widget: object
            fields:
              - { name: revendedorMsg, label: Mensagem — Revendedor, widget: text }
              - { name: atacadoMsg,    label: Mensagem — Atacado,    widget: text }
